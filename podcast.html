<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Podcast - The Sickness Panacea</title>
    <meta
      name="description"
      content="The Sickness Panacea podcast."
    >
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header" aria-label="Site header">
        <a class="brand" href="index.html" aria-label="The Sickness Panacea home">
          <img src="assets/tsp-ans-base.png" alt="The Sickness Panacea logo">
        </a>
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="index.html">Home</a>
          <a href="index.html#writings">Writings</a>
          <a href="podcast.html" aria-current="page">Podcast</a>
        </nav>
      </header>

      <main>
        <section class="intro" aria-labelledby="podcast-title">
          <p class="kicker">Podcast</p>
          <h1 id="podcast-title">The Sickness Panacea Podcast</h1>
          <p class="subtitle">
            Conversations and fragments on nervous systems, civilisation,
            illness, refuge, and return.
          </p>
        </section>

        <section class="archive-list" aria-labelledby="episodes-title">
          <h2 id="episodes-title">Episodes</h2>
          <article class="archive-entry">
            <a
              href="https://www.youtube.com/playlist?list=PLTsJO3qq2h02RzRa3wcxJq14iagQq2JB6"
              target="_blank"
              rel="noopener noreferrer"
            >
              <span class="entry-title">YouTube playlist</span>
              <span class="entry-note">
                The current archive of podcast episodes.
              </span>
            </a>
          </article>
          <article class="archive-entry">
            <a
              href="https://open.spotify.com/show/2OgM4KuCqoZz97LIRK2ecM?si=a16d2b7efd5c426c"
              target="_blank"
              rel="noopener noreferrer"
            >
              <span class="entry-title">Spotify</span>
              <span class="entry-note">
                The podcast archive on Spotify.
              </span>
            </a>
          </article>
        </section>
      </main>

      <footer class="site-footer">
        <p>&copy; <span data-current-year></span> The Sickness Panacea</p>
      </footer>
    </div>
    <script>
      document.querySelectorAll("[data-current-year]").forEach((year) => {
        year.textContent = new Date().getFullYear();
      });
    </script>
  </body>
</html>
